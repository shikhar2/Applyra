version: '3.9'

services:
  applyra:
    build:
      context: .
      dockerfile: Dockerfile.full
    ports:
      - "80:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:////app/data/applyra.db

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.full
    command: python -m backend.scheduler
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - applyra
      - redis
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:////app/data/applyra.db

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
